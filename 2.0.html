  <button onclick="window.commitSTAction(this)" style="width: 100%; background-color: #d9534f; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s;">点击确认并复制所选选项</button>

<script>
// 关键修复：将函数绑定到 window 全局对象，防止酒馆动态加载时作用域丢失导致找不到函数
window.commitSTAction = function(btn) {
  try {
    const panel = btn.closest('.st-panel-container');
    const getVals = (cls) => {
        let vals = [];
        panel.querySelectorAll(`.${cls}:checked`).forEach(el => {
            if (el.classList.contains('custom-trigger')) {
                const targetClass = el.getAttribute('data-target');
                const customVal = panel.querySelector(`.${targetClass}`).value.trim();
                if (customVal) vals.push(customVal);
            } else {
                vals.push(el.value);
            }
        });
        return vals;
    };
    
    const q1 = getVals('q1-cb'), q2 = getVals('q2-cb'), q4 = getVals('q4-cb');
    let q3 = "";
    const q3Node = panel.querySelector('.q3-rad:checked');
    if (q3Node) {
        if (q3Node.classList.contains('custom-trigger')) {
            const num = panel.querySelector('.q3-custom-input').value.trim();
            if (num) q3 = `生成不少于${num}字剧情`;
        } else {
            q3 = q3Node.value;
        }
    }
    
    let parts = [];
    if (q1.length) parts.push(`【我的行动】：${q1.join(' ； ')}`);
    if (q2.length) parts.push(`【我的对话】：${q2.join(' ； ')}`);
    if (q4.length) parts.push(`【追加指令】：${q4.join(' ； ')}`);
    if (q3) parts.push(`【系统指令】：${q3}`);
    
    if (parts.length === 0) return alert('⚠️ 至少需要勾选或输入一个选项！');
    const finalStr = parts.join('\n');

    // 1. 优先尝试直接填入酒馆底部的输入框
    const stTextarea = document.getElementById('send_textarea');
    if (stTextarea) {
        const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, "value").set;
        if (nativeInputValueSetter) {
            nativeInputValueSetter.call(stTextarea, finalStr);
        } else {
            stTextarea.value = finalStr;
        }
        stTextarea.dispatchEvent(new Event('input', { bubbles: true }));
    }

    // 2. 强力复制到剪贴板 (作为双重保险)
    const fallbackCopy = (text) => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.opacity = "0";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            btn.innerText = '✅ 选项已填入输入框并复制'; 
            btn.style.backgroundColor = '#5cb85c';
        } catch (err) {
            prompt('自动复制失败，请手动复制以下文本：', text);
        }
        document.body.removeChild(textArea);
    };

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(finalStr).then(() => {
            btn.innerText = '✅ 选项已填入输入框并复制'; 
            btn.style.backgroundColor = '#5cb85c';
        }).catch(() => {
            fallbackCopy(finalStr);
        });
    } else {
        fallbackCopy(finalStr);
    }

  } catch(err) { 
      alert('处理过程出错: ' + err.message); 
  }
};
</script>
